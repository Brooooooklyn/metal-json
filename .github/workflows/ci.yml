name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # macos-15 runners are Apple Silicon, but the GPU is an "Apple
    # Paravirtual device" whose backend shader compiler crashes
    # nondeterministically while building this crate's pipeline states
    # (different kernel each run; once it dies, every later PSO in the
    # process fails — see the PSO probe step output). GPU tests therefore
    # CANNOT run reliably on GitHub-hosted runners; they are explicitly
    # disabled here via METAL_JSON_DISABLE_GPU and run on real hardware
    # instead. CI still covers the entire CPU side: the cpu-reference
    # oracle test suite (the bit-exact spec the GPU kernels diff against),
    # build, clippy, and the bench/xtask crates.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --workspace
      - name: Fetch JSONTestSuite
        run: bash scripts/fetch_jsontestsuite.sh
      - name: PSO probe (canary)
        # Tries to build every kernel's pipeline state on the runner's
        # paravirtual device and prints per-kernel verdicts. Informational:
        # when this starts reporting "0 of 27 kernels failed" across a few
        # runs, the VM Metal stack has been fixed and the
        # METAL_JSON_DISABLE_GPU gating below can be removed.
        continue-on-error: true
        run: |
          cargo run --example pso_probe
          MTL_SHADER_VALIDATION=1 cargo run --example pso_probe
      - name: Test (CPU reference + non-GPU)
        run: |
          cargo test --workspace
          cargo test -p metal-json --features cpu-reference
        env:
          # GPU tests skip loudly (see MetalContext::new); the cpu-reference
          # oracle suite carries the differential coverage on CI.
          METAL_JSON_DISABLE_GPU: "1"
      - name: Test (runtime-shaders, CPU paths)
        run: |
          cargo test -p metal-json --features runtime-shaders
          cargo test -p metal-json --features runtime-shaders,cpu-reference --test gpu_e2e
        env:
          METAL_JSON_DISABLE_GPU: "1"
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
