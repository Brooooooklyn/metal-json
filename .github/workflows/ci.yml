name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # macos-15 runners are Apple Silicon with a real Metal GPU.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --workspace
      - name: Fetch JSONTestSuite
        run: bash scripts/fetch_jsontestsuite.sh
      - name: Test
        run: |
          cargo test --workspace
          cargo test -p metal-json --features cpu-reference
        env:
          MTL_SHADER_VALIDATION: "1"
          # CI runners must have a Metal device; never let GPU tests
          # silently skip here.
          METAL_JSON_REQUIRE_GPU: "1"
      - name: Test (runtime-shaders fallback path)
        run: cargo test -p metal-json --features runtime-shaders
        env:
          MTL_SHADER_VALIDATION: "1"
          METAL_JSON_REQUIRE_GPU: "1"
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
